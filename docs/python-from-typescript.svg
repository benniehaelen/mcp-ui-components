<svg width="1120" height="700" viewBox="0 0 1120 700" xmlns="http://www.w3.org/2000/svg" font-family="DejaVu Sans, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="req" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3450a3"/>
    </marker>
    <marker id="ret" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1120" height="700" fill="#fafbfc"/>

  <!-- title -->
  <text x="40" y="46" font-size="25" font-weight="bold" fill="#1e2430">Calling Python from the TypeScript widget</text>
  <text x="40" y="73" font-size="14" fill="#5b6472">A widget interaction becomes an MCP tool call. The host proxies it; your Python tool runs the logic and the database access.</text>

  <!-- lifelines -->
  <line x1="150" y1="150" x2="150" y2="648" stroke="#c3cede" stroke-width="1.4" stroke-dasharray="4 5"/>
  <line x1="430" y1="150" x2="430" y2="648" stroke="#c3cede" stroke-width="1.4" stroke-dasharray="4 5"/>
  <line x1="720" y1="150" x2="720" y2="648" stroke="#c3cede" stroke-width="1.4" stroke-dasharray="4 5"/>
  <line x1="980" y1="150" x2="980" y2="648" stroke="#c3cede" stroke-width="1.4" stroke-dasharray="4 5"/>

  <!-- lifeline heads -->
  <rect x="60" y="92" width="180" height="58" rx="10" fill="#e8eefb" stroke="#b9c7ec" stroke-width="1.4"/>
  <text x="150" y="120" font-size="15" font-weight="bold" fill="#1e2430" text-anchor="middle">Widget</text>
  <text x="150" y="138" font-size="11.5" fill="#5b6472" text-anchor="middle">TypeScript · sandboxed iframe</text>

  <rect x="340" y="92" width="180" height="58" rx="10" fill="#233659"/>
  <text x="430" y="120" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">Host</text>
  <text x="430" y="138" font-size="11.5" fill="#c3cede" text-anchor="middle">VS Code · control plane</text>

  <rect x="630" y="92" width="180" height="58" rx="10" fill="#eef2f8" stroke="#c3cede" stroke-width="1.4"/>
  <text x="720" y="120" font-size="15" font-weight="bold" fill="#1e2430" text-anchor="middle">MCP Server</text>
  <text x="720" y="138" font-size="11.5" fill="#5b6472" text-anchor="middle">Python · stdio or HTTP</text>

  <rect x="890" y="92" width="180" height="58" rx="10" fill="#f3f1ec" stroke="#d8d4cb" stroke-width="1.4"/>
  <text x="980" y="116" font-size="15" font-weight="bold" fill="#1e2430" text-anchor="middle">Provider + DB</text>
  <text x="980" y="134" font-size="11.5" fill="#5b6472" text-anchor="middle">Python · Neo4j /</text>
  <text x="980" y="147" font-size="11.5" fill="#5b6472" text-anchor="middle">BigQuery</text>

  <!-- ===================== REQUESTS (down the stack) ===================== -->

  <!-- 1: widget -> host -->
  <text x="290" y="183" font-size="12.5" fill="#3450a3" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">app.callServerTool({ name, arguments })</text>
  <line x1="150" y1="196" x2="430" y2="196" stroke="#3450a3" stroke-width="2.2" marker-end="url(#req)"/>
  <text x="290" y="211" font-size="11" fill="#8a93a3" text-anchor="middle">postMessage · JSON-RPC over the sandbox boundary</text>
  <circle cx="150" cy="196" r="11" fill="#3450a3"/><text x="150" y="200" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">1</text>

  <!-- 2: host governs -->
  <rect x="352" y="232" width="156" height="30" rx="8" fill="#2c4068" stroke="#3a527f"/>
  <text x="430" y="251" font-size="12" fill="#ffffff" text-anchor="middle">auth · guardrails · trace</text>
  <circle cx="430" cy="247" r="11" fill="#3450a3" opacity="0"/>
  <text x="332" y="251" font-size="12" font-weight="bold" fill="#3450a3" text-anchor="end">2</text>

  <!-- 3: host -> server -->
  <text x="575" y="295" font-size="12.5" fill="#3450a3" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">tools/call { name, arguments }</text>
  <line x1="430" y1="308" x2="720" y2="308" stroke="#3450a3" stroke-width="2.2" marker-end="url(#req)"/>
  <text x="575" y="323" font-size="11" fill="#8a93a3" text-anchor="middle">MCP request over stdio / HTTP</text>
  <circle cx="430" cy="308" r="11" fill="#3450a3"/><text x="430" y="312" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">3</text>

  <!-- 4: server -> provider -->
  <text x="850" y="357" font-size="12.5" fill="#3450a3" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">provider.describe(node)</text>
  <line x1="720" y1="370" x2="980" y2="370" stroke="#3450a3" stroke-width="2.2" marker-end="url(#req)"/>
  <text x="850" y="385" font-size="11" fill="#8a93a3" text-anchor="middle">tools.call_tool() dispatch (your Python)</text>
  <circle cx="720" cy="370" r="11" fill="#3450a3"/><text x="720" y="374" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">4</text>

  <!-- 5: provider self / DB -->
  <path d="M 980 408 h 70 v 28 h -70" fill="none" stroke="#7d5ba6" stroke-width="2" marker-end="url(#req)"/>
  <rect x="905" y="404" width="150" height="0" fill="none"/>
  <text x="1044" y="402" font-size="11.5" fill="#7d5ba6" text-anchor="end" font-family="DejaVu Sans Mono, monospace">query</text>
  <text x="975" y="430" font-size="11" fill="#8a93a3" text-anchor="end">Neo4j / BigQuery / SQL</text>
  <circle cx="980" cy="408" r="11" fill="#7d5ba6"/><text x="980" y="412" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">5</text>

  <!-- ===================== RESPONSES (back up, dashed) ===================== -->

  <!-- 6: provider -> server -->
  <line x1="980" y1="478" x2="720" y2="478" stroke="#6b7280" stroke-width="1.8" stroke-dasharray="7 5" marker-end="url(#ret)"/>
  <text x="850" y="471" font-size="12" fill="#6b7280" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">dict (rows)</text>
  <text x="966" y="471" font-size="12" font-weight="bold" fill="#6b7280" text-anchor="end">6</text>

  <!-- 7: server -> host -->
  <line x1="720" y1="528" x2="430" y2="528" stroke="#6b7280" stroke-width="1.8" stroke-dasharray="7 5" marker-end="url(#ret)"/>
  <text x="575" y="521" font-size="12" fill="#6b7280" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">CallToolResult · structuredContent</text>
  <text x="706" y="521" font-size="12" font-weight="bold" fill="#6b7280" text-anchor="end">7</text>

  <!-- 8: host -> widget -->
  <line x1="430" y1="578" x2="150" y2="578" stroke="#6b7280" stroke-width="1.8" stroke-dasharray="7 5" marker-end="url(#ret)"/>
  <text x="290" y="571" font-size="12" fill="#6b7280" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">tool result (postMessage)</text>
  <text x="416" y="571" font-size="12" font-weight="bold" fill="#6b7280" text-anchor="end">8</text>

  <!-- 9: widget renders -->
  <rect x="72" y="600" width="156" height="30" rx="8" fill="#e8eefb" stroke="#b9c7ec"/>
  <text x="150" y="619" font-size="11.5" fill="#1e2430" text-anchor="middle" font-family="DejaVu Sans Mono, monospace">await resolves → render</text>
  <text x="244" y="619" font-size="12" font-weight="bold" fill="#3450a3" text-anchor="start">9</text>

  <!-- legend -->
  <line x1="430" y1="672" x2="470" y2="672" stroke="#3450a3" stroke-width="2.2"/>
  <text x="478" y="676" font-size="11.5" fill="#5b6472">request (down the stack)</text>
  <line x1="660" y1="672" x2="700" y2="672" stroke="#6b7280" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="708" y="676" font-size="11.5" fill="#5b6472">response (back up)</text>

  <text x="1080" y="690" font-size="11" fill="#8a93a3" text-anchor="end">MCP Apps · the widget never touches the DB directly — only via a governed tool call</text>
</svg>
