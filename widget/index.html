<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light dark" />
<title>Lineage viewer</title>
<style>
  /* ---- design tokens ------------------------------------------------- */
  :root {
    --canvas: #fafbfd; --dot: #e4e7f1;
    --surface: #ffffff; --hair: #e7e9f1; --node-border: #c2c8d8;
    --ink: #1a1f2e; --muted: #6b7280; --faint: #9aa1b2;
    --accent: #4456c7; --accent-weak: #eef0fb; --ring: rgba(68,86,199,.18);
    --edge: #c4c9d6; --edge-strong: #4456c7; --shadow: rgba(23,30,60,.10);
    --err: #b3402e;
    --k-source: #5b7fa6; --k-staging: #c08a3e; --k-fact: #4e8a5f;
    --k-metric: #7d5ba6; --k-view: #3e8f96;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Cascadia Mono", Menlo, Consolas, monospace;
  }
  :root[data-theme="dark"] { color-scheme: dark; }
  @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) { color-scheme: dark; } }
  :root[data-theme="dark"], :root:not([data-theme="light"]) { }

  /* dark palette */
  :root[data-theme="dark"] {
    --canvas: #14171f; --dot: #272d3b;
    --surface: #1e2230; --hair: #2b3140; --node-border: #424b61;
    --ink: #e8ebf3; --muted: #99a2b4; --faint: #69728a;
    --accent: #8aa6e8; --accent-weak: #232b41; --ring: rgba(138,166,232,.22);
    --edge: #3a4154; --edge-strong: #8aa6e8; --shadow: rgba(0,0,0,.55);
    --err: #e8917f;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --canvas: #14171f; --dot: #272d3b;
      --surface: #1e2230; --hair: #2b3140; --node-border: #424b61;
      --ink: #e8ebf3; --muted: #99a2b4; --faint: #69728a;
      --accent: #8aa6e8; --accent-weak: #232b41; --ring: rgba(138,166,232,.22);
      --edge: #3a4154; --edge-strong: #8aa6e8; --shadow: rgba(0,0,0,.55);
      --err: #e8917f;
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--mcp-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif);
    color: var(--ink); background: var(--surface);
    display: flex; flex-direction: column; min-height: 480px;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }

  /* ---- header -------------------------------------------------------- */
  header {
    padding: 13px 18px 12px; display: flex; align-items: center; gap: 11px;
    border-bottom: 1px solid var(--hair); background: var(--surface);
  }
  header .title { font-size: 13.5px; font-weight: 650; letter-spacing: -.01em; }
  header .focus {
    font-family: var(--mono); font-size: 11.5px; color: var(--accent);
    background: var(--accent-weak); border-radius: 6px; padding: 2px 8px;
    border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
  }
  header .focus::before { content: "› "; color: var(--faint); }
  header .spacer { flex: 1; }
  header .badge {
    font-size: 10px; letter-spacing: .03em; text-transform: uppercase;
    color: var(--faint); border: 1px solid var(--hair); border-radius: 999px; padding: 3px 9px;
  }

  /* ---- canvas -------------------------------------------------------- */
  #stage {
    flex: 1; min-height: 0; position: relative; overflow: hidden;
    background-color: var(--canvas);
    background-image: radial-gradient(var(--dot) 1.1px, transparent 1.1px);
    background-size: 22px 22px; background-position: -1px -1px;
  }
  svg { width: 100%; height: 100%; display: block; }

  /* ---- edges --------------------------------------------------------- */
  .edge { fill: none; stroke: var(--edge); stroke-width: 1.5; marker-end: url(#ah); transition: opacity .18s, stroke .18s; }
  .edge.trace { stroke: var(--edge-strong); stroke-width: 2; marker-end: url(#ah-strong); stroke-dasharray: 7 5; animation: flow 1s linear infinite; }
  .edge.dim { opacity: .16; }
  @keyframes flow { to { stroke-dashoffset: -24; } }
  #ah path { fill: var(--edge); }
  #ah-strong path { fill: var(--edge-strong); }

  /* ---- nodes --------------------------------------------------------- */
  .node-box { cursor: pointer; transition: opacity .18s; }
  .node-box .body {
    fill: var(--surface); stroke: var(--node-border); stroke-width: 1.4;
    filter: drop-shadow(0 1px 2px var(--shadow)); transition: stroke .14s;
  }
  .node-box:hover .body { stroke: color-mix(in srgb, var(--accent) 55%, var(--hair)); }
  .node-box.focus .body { stroke: var(--k-fact); stroke-width: 2; }
  .node-box.selected .body { stroke: var(--accent); stroke-width: 2; filter: drop-shadow(0 0 0 3px var(--ring)); }
  .node-box.dim { opacity: .28; }
  .node-box .label { font-family: var(--mono); font-size: 12px; font-weight: 500; fill: var(--ink); }
  .node-box.focus .label { font-weight: 650; }
  .node-box .kind { font-size: 9px; font-weight: 600; letter-spacing: .07em; fill: var(--faint); text-transform: uppercase; }
  .node-box .star { fill: var(--k-fact); font-size: 11px; }

  /* ---- expand / collapse toggles ------------------------------------ */
  .toggle { cursor: pointer; }
  .toggle .pill { fill: var(--surface); stroke: var(--accent); stroke-width: 1.3; filter: drop-shadow(0 1px 1.5px var(--shadow)); transition: fill .12s; }
  .toggle:hover .pill { fill: var(--accent-weak); }
  .toggle text { font-family: var(--mono); font-size: 10.5px; font-weight: 700; fill: var(--accent); text-anchor: middle; dominant-baseline: central; pointer-events: none; }

  /* ---- details panel ------------------------------------------------- */
  #details {
    position: absolute; top: 12px; right: 12px; bottom: 12px; width: 272px;
    background: var(--surface); border: 1px solid var(--hair); border-radius: 12px;
    box-shadow: 0 10px 30px var(--shadow); padding: 0; overflow: hidden;
    display: none; font-size: 12.5px;
    opacity: 0; transform: translateX(10px); transition: opacity .2s ease, transform .2s ease;
  }
  #details.open { display: flex; flex-direction: column; opacity: 1; transform: none; }
  #details .phead { padding: 14px 16px 12px; border-bottom: 1px solid var(--hair); position: relative; }
  #details .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 9.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  #details .pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  #details h2 { font-family: var(--mono); font-size: 14.5px; font-weight: 600; margin: 7px 0 0; word-break: break-all; }
  #details .body { padding: 12px 16px 16px; overflow-y: auto; }
  #details .desc { color: var(--muted); margin: 0 0 14px; line-height: 1.5; }
  #details dl { display: grid; grid-template-columns: auto 1fr; gap: 7px 14px; margin: 0; }
  #details dt { color: var(--faint); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; align-self: center; }
  #details dd { margin: 0; font-family: var(--mono); font-size: 11.5px; font-variant-numeric: tabular-nums; }
  #details .sec { font-size: 9.5px; text-transform: uppercase; letter-spacing: .07em; color: var(--faint); margin: 16px 0 7px; padding-top: 12px; border-top: 1px solid var(--hair); }
  #details .chips span {
    display: inline-block; font-family: var(--mono); font-size: 11px; color: var(--ink);
    background: var(--accent-weak); border: 1px solid color-mix(in srgb, var(--accent) 16%, transparent);
    border-radius: 6px; padding: 2px 7px; margin: 0 5px 5px 0;
  }
  #details .close { position: absolute; top: 12px; right: 13px; cursor: pointer; color: var(--faint); font-size: 15px; line-height: 1; border: 0; background: none; padding: 2px; border-radius: 5px; }
  #details .close:hover { color: var(--ink); background: var(--hair); }

  /* ---- footer -------------------------------------------------------- */
  footer { border-top: 1px solid var(--hair); padding: 10px 18px; display: flex; align-items: center; gap: 13px; background: var(--surface); }
  #status { font-size: 11.5px; color: var(--muted); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #status.err { color: var(--err); }
  button.ghost {
    font: inherit; font-size: 11.5px; font-weight: 500; color: var(--muted); background: transparent;
    border: 1px solid var(--hair); border-radius: 7px; padding: 5px 11px; cursor: pointer; transition: all .12s; white-space: nowrap;
  }
  button.ghost:hover { color: var(--ink); border-color: color-mix(in srgb, var(--accent) 40%, var(--hair)); }
  .legend { margin-left: auto; display: flex; gap: 12px; font-size: 10px; color: var(--muted); flex-wrap: wrap; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .legend i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  @media (prefers-reduced-motion: reduce) {
    .edge.trace { animation: none; }
    *, #details { transition: none !important; }
  }
</style>
</head>
<body>
  <header>
    <span class="title">Data lineage</span>
    <span class="focus" id="focus-chip">fct_patient_visits</span>
    <span class="spacer"></span>
    <span class="badge">MCP App</span>
  </header>

  <div id="stage">
    <svg id="svg" preserveAspectRatio="xMidYMid meet" aria-label="lineage graph">
      <defs>
        <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
          <path d="M0 1 L9 5 L0 9 z" />
        </marker>
        <marker id="ah-strong" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
          <path d="M0 1 L9 5 L0 9 z" />
        </marker>
      </defs>
    </svg>
    <aside id="details">
      <div class="phead">
        <button class="close" id="details-close" title="Close">✕</button>
        <div id="details-head"></div>
      </div>
      <div class="body" id="details-body"></div>
    </aside>
  </div>

  <footer>
    <span id="status">Loading…</span>
    <button class="ghost" id="reset">Reset view</button>
    <span class="legend">
      <span><i style="background:#5b7fa6"></i>source</span>
      <span><i style="background:#c08a3e"></i>staging</span>
      <span><i style="background:#4e8a5f"></i>fact</span>
      <span><i style="background:#7d5ba6"></i>metric</span>
      <span><i style="background:#3e8f96"></i>view</span>
    </span>
  </footer>

  <script type="module" src="/src/lineage-app.ts"></script>
</body>
</html>
